<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='newbuildings',
        headerTitle='Редактирование новостроя',
        breadcrumb='Новострои / Спецификация',
        extraStyles=~{::specificationStyles},
        extraScripts=~{::specificationScripts}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Спецификация</title>

    <th:block th:fragment="specificationStyles">
        <link rel="stylesheet" th:href="@{/css/admin/newbuildings.css}">
        <link rel="stylesheet" th:href="@{/adminlte/plugins/summernote/summernote-bs4.min.css}">
    </th:block>
</head>

<body>
<section>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Редактирование: <span th:text="${newBuilding.name}"></span>
            </h3>
        </div>

        <div class="card-body">
            <div th:replace="~{admin/newbuildings/_tabs :: tabs(${mode}, ${activeTab}, ${newBuilding.id})}"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active">
                    <div th:replace="~{admin/newbuildings/_specification-form :: specificationForm(
                        @{/admin/new-buildings/{id}/specification(id=${newBuilding.id})},
                        false,
                        @{/admin/new-buildings}
                    )}"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block th:fragment="specificationScripts">
    <script th:src="@{/adminlte/plugins/summernote/summernote-bs4.min.js}"></script>
</th:block>
</body>
</html>
