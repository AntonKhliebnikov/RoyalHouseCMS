<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='newbuildings',
        headerTitle='Редактирование новостроя',
        breadcrumb='Новострои / Квартиры',
        extraStyles=~{::newbuildingStyles},
        extraScripts=~{}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Квартиры</title>

    <th:block th:fragment="newbuildingStyles">
        <link rel="stylesheet" th:href="@{/css/admin/newbuildings.css}">
    </th:block>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Редактирование: <span th:text="${newBuilding.name}"></span>
            </h3>
        </div>

        <div class="card-body">
            <div th:replace="~{admin/newbuildings/_tabs :: tabs(${mode}, ${activeTab}, ${newBuilding.id})}"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active">
                    <div th:replace="~{admin/newbuildings/_apartments-form :: apartmentsForm(
                        @{/admin/new-buildings/{id}/apartments(id=${newBuilding.id})},
                        false,
                        @{/admin/new-buildings}
                    )}"></div>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
