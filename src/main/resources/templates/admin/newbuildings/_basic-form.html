<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="basicForm(formAction, readOnly)">
    <form method="post"
          enctype="multipart/form-data"
          th:action="${formAction}"
          th:object="${basicForm}"
          id="basic-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>Название <span class="text-danger">*</span></label>
            <input type="text"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                   th:field="*{name}"
                   th:readonly="${readOnly}">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label>Главный баннер</label>

            <input type="hidden" th:field="*{currentBannerImagePath}"/>

            <div id="bannerPreviewWrapper"
                 class="banner-preview-wrapper mb-2"
                 th:classappend="${basicForm.currentBannerImagePath == null or #strings.isEmpty(basicForm.currentBannerImagePath)} ? ' banner-placeholder' : ''">

                <img id="bannerPreviewImage"
                     th:if="${basicForm.currentBannerImagePath != null and !#strings.isEmpty(basicForm.currentBannerImagePath)}"
                     th:src="@{${basicForm.currentBannerImagePath}}"
                     alt="Главный баннер"
                     class="banner-preview-image">

                <span id="bannerPlaceholderText"
                      th:if="${basicForm.currentBannerImagePath == null or #strings.isEmpty(basicForm.currentBannerImagePath)}">
            Image
        </span>
            </div>

            <div class="font-weight-bold mb-2">Рекомендуемый размер: (1920x800)</div>

            <input type="file"
                   id="bannerImageInput"
                   class="form-control-file"
                   th:field="*{bannerImage}"
                   th:disabled="${readOnly}"
                   accept="image/*">
        </div>

        <div class="form-row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Порядок сортировки <span class="text-danger">*</span></label>
                    <input type="number"
                           min="0"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('sortOrder')} ? ' is-invalid'"
                           th:field="*{sortOrder}"
                           th:readonly="${readOnly}">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('sortOrder')}"
                         th:errors="*{sortOrder}"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label>Статус <span class="text-danger">*</span></label>
                    <select class="form-control"
                            th:classappend="${#fields.hasErrors('isActive')} ? ' is-invalid'"
                            th:field="*{isActive}"
                            th:disabled="${readOnly}">
                        <option th:value="true">Активный</option>
                        <option th:value="false">Неактивный</option>
                    </select>

                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('isActive')}"
                         th:errors="*{isActive}"></div>

                    <input th:if="${readOnly}" type="hidden" th:field="*{isActive}"/>
                </div>
            </div>
        </div>

        <hr>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Инфографика</h5>

            <button th:if="${!readOnly}"
                    type="button"
                    class="btn btn-outline-primary btn-sm"
                    id="add-infographic-item">
                <i class="fas fa-plus"></i> Добавить элемент
            </button>
        </div>

        <div id="basic-infographics-container">
            <div th:each="item, stat : *{basicInfographics}"
                 class="card card-outline card-secondary mb-3 js-infographic-item">

                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="card-title mb-0"
                        th:text="'Элемент инфографики #' + ${stat.index + 1}"></h3>

                    <button th:if="${!readOnly}"
                            type="button"
                            class="btn btn-outline-danger btn-sm js-remove-infographic-item">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>

                <div class="card-body">
                    <input type="hidden"
                           th:field="*{basicInfographics[__${stat.index}__].currentImagePath}"
                           data-field="currentImagePath">

                    <div class="form-row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>Порядок</label>
                                <input type="number"
                                       min="1"
                                       class="form-control"
                                       th:field="*{basicInfographics[__${stat.index}__].sortOrder}"
                                       th:readonly="${readOnly}"
                                       data-field="sortOrder">
                            </div>
                        </div>

                        <div class="col-md-9">
                            <div class="form-group">
                                <label>Описание</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{basicInfographics[__${stat.index}__].description}"
                                       th:readonly="${readOnly}"
                                       data-field="description">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Изображение</label>

                        <div class="infographic-preview-wrapper mb-2"
                             th:classappend="${item.currentImagePath == null or #strings.isEmpty(item.currentImagePath)} ? ' infographic-placeholder' : ''"
                             data-preview-wrapper>
                            <img th:if="${item.currentImagePath != null and !#strings.isEmpty(item.currentImagePath)}"
                                 th:src="@{${item.currentImagePath}}"
                                 alt="Инфографика"
                                 class="infographic-preview-image"
                                 data-preview-image>

                            <span th:if="${item.currentImagePath == null or #strings.isEmpty(item.currentImagePath)}"
                                  data-preview-placeholder>
            Image
        </span>
                        </div>

                        <input type="file"
                               class="form-control-file"
                               th:field="*{basicInfographics[__${stat.index}__].image}"
                               th:disabled="${readOnly}"
                               accept="image/*"
                               data-field="image"
                               data-preview-input>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${!readOnly}">
            <button type="submit" class="btn btn-primary">
                Сохранить
            </button>
        </div>
    </form>

    <div th:if="${!readOnly}" id="infographic-item-template" class="d-none">
        <div class="card card-outline card-secondary mb-3 js-infographic-item">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">Элемент инфографики</h3>

                <button type="button"
                        class="btn btn-outline-danger btn-sm js-remove-infographic-item">
                    <i class="fas fa-trash"></i>
                </button>
            </div>

            <div class="card-body">
                <input type="hidden" data-field="currentImagePath" value="">

                <div class="form-row">
                    <div class="col-md-3">
                        <div class="form-group">
                            <label>Порядок</label>
                            <input type="number"
                                   min="1"
                                   class="form-control"
                                   data-field="sortOrder">
                        </div>
                    </div>

                    <div class="col-md-9">
                        <div class="form-group">
                            <label>Описание</label>
                            <input type="text"
                                   class="form-control"
                                   data-field="description">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Изображение</label>

                    <div class="infographic-preview-wrapper infographic-placeholder mb-2"
                         data-preview-wrapper>
                        <span data-preview-placeholder>Image</span>
                    </div>

                    <input type="file"
                           class="form-control-file"
                           accept="image/*"
                           data-field="image"
                           data-preview-input>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${!readOnly}">
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('basic-form');
            const container = document.getElementById('basic-infographics-container');
            const addButton = document.getElementById('add-infographic-item');
            const template = document.getElementById('infographic-item-template');

            const bannerInput = document.getElementById('bannerImageInput');
            const bannerWrapper = document.getElementById('bannerPreviewWrapper');

            function initBannerPreview() {
                if (!bannerInput || !bannerWrapper) {
                    return;
                }

                bannerInput.addEventListener('change', function () {
                    const file = bannerInput.files && bannerInput.files[0];
                    if (!file) {
                        return;
                    }

                    const previewUrl = URL.createObjectURL(file);

                    const placeholderText = document.getElementById('bannerPlaceholderText');
                    if (placeholderText) {
                        placeholderText.remove();
                    }

                    let image = document.getElementById('bannerPreviewImage');
                    if (!image) {
                        image = document.createElement('img');
                        image.id = 'bannerPreviewImage';
                        image.className = 'banner-preview-image';
                        image.alt = 'Главный баннер';
                        bannerWrapper.appendChild(image);
                    }

                    image.src = previewUrl;
                    bannerWrapper.classList.remove('banner-placeholder');
                });
            }

            function renumberItems() {
                const items = container.querySelectorAll('.js-infographic-item');

                items.forEach(function (item, index) {
                    const title = item.querySelector('.card-title');
                    if (title) {
                        title.textContent = 'Элемент инфографики #' + (index + 1);
                    }

                    const fieldMappings = [
                        { selector: '[data-field="currentImagePath"]', field: 'currentImagePath' },
                        { selector: '[data-field="sortOrder"]', field: 'sortOrder' },
                        { selector: '[data-field="description"]', field: 'description' },
                        { selector: '[data-field="image"]', field: 'image' }
                    ];

                    fieldMappings.forEach(function (mapping) {
                        const input = item.querySelector(mapping.selector);
                        if (!input) {
                            return;
                        }

                        input.name = 'basicInfographics[' + index + '].' + mapping.field;
                        input.id = 'basicInfographics' + index + '.' + mapping.field;
                    });
                });
            }

            function updateInfographicPreview(fileInput) {
                const item = fileInput.closest('.js-infographic-item');
                if (!item) {
                    return;
                }

                const wrapper = item.querySelector('[data-preview-wrapper]');
                if (!wrapper) {
                    return;
                }

                const file = fileInput.files && fileInput.files[0];
                if (!file) {
                    return;
                }

                const previewUrl = URL.createObjectURL(file);

                const placeholder = wrapper.querySelector('[data-preview-placeholder]');
                if (placeholder) {
                    placeholder.remove();
                }

                let image = wrapper.querySelector('[data-preview-image]');
                if (!image) {
                    image = document.createElement('img');
                    image.className = 'infographic-preview-image';
                    image.alt = 'Инфографика';
                    image.setAttribute('data-preview-image', '');
                    wrapper.appendChild(image);
                }

                image.src = previewUrl;
                wrapper.classList.remove('infographic-placeholder');
            }

            function addItem() {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = template.innerHTML.trim();

                const newItem = wrapper.firstElementChild;
                const sortOrderInput = newItem.querySelector('[data-field="sortOrder"]');
                if (sortOrderInput) {
                    sortOrderInput.value = container.querySelectorAll('.js-infographic-item').length + 1;
                }

                container.appendChild(newItem);
                renumberItems();
            }

            if (addButton && container && template && form) {
                addButton.addEventListener('click', function () {
                    addItem();
                });

                container.addEventListener('click', function (event) {
                    const removeButton = event.target.closest('.js-remove-infographic-item');
                    if (!removeButton) {
                        return;
                    }

                    const item = removeButton.closest('.js-infographic-item');
                    if (item) {
                        item.remove();
                        renumberItems();
                    }
                });

                container.addEventListener('change', function (event) {
                    const fileInput = event.target.closest('[data-preview-input]');
                    if (!fileInput) {
                        return;
                    }

                    updateInfographicPreview(fileInput);
                });

                form.addEventListener('submit', function () {
                    renumberItems();
                });

                renumberItems();
            }

            initBannerPreview();
        });
    </script>
</th:block>

</body>
</html>
