<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* @thymesVar id="basicForm" type="com.royalhouse.cms.admin.newbuilding.dto.AdminNewBuildingBasicForm" */-->
<!--/* @thymesVar id="_csrf" type="org.springframework.security.web.csrf.CsrfToken" */-->
<!--/* @thymesVar id="formAction" type="java.lang.String" */-->
<!--/* @thymesVar id="cancelUrl" type="java.lang.String" */-->
<!--/* @thymesVar id="readOnly" type="java.lang.Boolean" */-->

<th:block th:fragment="basicForm(formAction, readOnly, cancelUrl)">
    <form method="post"
          enctype="multipart/form-data"
          th:action="${formAction}"
          th:object="${basicForm}"
          id="basic-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="newbuilding-basic-form">

            <!-- Верхняя зона формы -->
            <div class="row nb-basic-top">
                <!-- Левая колонка: баннер -->
                <div class="col-lg-5">
                    <div class="form-group mb-4 mb-lg-0">
                        <label class="nb-section-label mb-2">Главный баннер</label>

                        <input type="hidden" th:field="*{currentBannerImagePath}"/>

                        <div id="bannerPreviewWrapper"
                             class="banner-preview-wrapper mb-3"
                             th:classappend="${basicForm.currentBannerImagePath == null or #strings.isEmpty(basicForm.currentBannerImagePath)} ? ' banner-placeholder' : ''">

                            <img id="bannerPreviewImage"
                                 th:if="${basicForm.currentBannerImagePath != null and !#strings.isEmpty(basicForm.currentBannerImagePath)}"
                                 th:src="@{${basicForm.currentBannerImagePath}}"
                                 alt="Главный баннер"
                                 class="banner-preview-image">

                            <span id="bannerPlaceholderText"
                                  th:if="${basicForm.currentBannerImagePath == null or #strings.isEmpty(basicForm.currentBannerImagePath)}">
                                Image
                            </span>
                        </div>

                        <div class="nb-banner-hint">Рекомендуемый размер: (1920x800)</div>

                        <div class="custom-file nb-custom-file nb-file-field" th:if="${!readOnly}">
                            <input type="file"
                                   id="bannerImageInput"
                                   class="custom-file-input"
                                   th:field="*{bannerImage}"
                                   th:disabled="${readOnly}"
                                   accept="image/*"
                                   th:attr="data-initial-label=${basicForm.currentBannerImagePath != null and !#strings.isEmpty(basicForm.currentBannerImagePath)} ? 'Файл выбран' : 'Файл не выбран'">

                            <label class="custom-file-label"
                                   for="bannerImageInput"
                                   id="bannerImageLabel"
                                   th:text="${basicForm.currentBannerImagePath != null and !#strings.isEmpty(basicForm.currentBannerImagePath)} ? 'Файл выбран' : 'Файл не выбран'">
                                Файл не выбран
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Правая колонка: поля -->
                <div class="col-lg-7">
                    <div class="row nb-top-fields-row align-items-end">
                        <div class="col-md-5">
                            <div class="form-group">
                                <label>Название <span class="text-danger">*</span></label>
                                <input type="text"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                                       th:field="*{name}"
                                       th:readonly="${readOnly}"
                                       placeholder="Название">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('name')}"
                                     th:errors="*{name}"></div>
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="form-group">
                                <label>Порядок сортировки <span class="text-danger">*</span></label>
                                <input type="number"
                                       min="1"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('sortOrder')} ? ' is-invalid'"
                                       th:field="*{sortOrder}"
                                       th:readonly="${readOnly}"
                                       placeholder="Порядок сортировки">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('sortOrder')}"
                                     th:errors="*{sortOrder}"></div>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="form-group nb-checkbox-group mb-0">
                                <div class="custom-control custom-checkbox nb-active-inline">
                                    <input type="checkbox"
                                           class="custom-control-input"
                                           id="isActive"
                                           th:field="*{isActive}"
                                           th:disabled="${readOnly}">
                                    <label class="custom-control-label" for="isActive">Активен</label>
                                </div>

                                <input th:if="${readOnly}" type="hidden" th:field="*{isActive}"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-danger mb-4" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="error : ${#fields.globalErrors()}"
                     th:text="${error}"></div>

                <small class="d-block mt-2">
                    After a verification error, you need to select the files to be downloaded again.
                </small>
            </div>

            <!-- Инфографика -->
            <div class="nb-infographics-block">
                <h3 class="nb-block-title">Инфографика</h3>

                <div id="basic-infographics-container">
                    <div th:each="item, stat : *{basicInfographics}"
                         class="nb-infographic-row js-infographic-item">

                        <input type="hidden"
                               th:field="*{basicInfographics[__${stat.index}__].currentImagePath}"
                               data-field="currentImagePath">

                        <input type="hidden"
                               th:field="*{basicInfographics[__${stat.index}__].sortOrder}"
                               data-field="sortOrder">

                        <div class="nb-infographic-line">
                            <div class="custom-file nb-custom-file nb-file-field" th:if="${!readOnly}">
                                <input type="file"
                                       class="custom-file-input"
                                       th:id="'basicInfographics' + ${stat.index} + '_image'"
                                       th:field="*{basicInfographics[__${stat.index}__].image}"
                                       th:disabled="${readOnly}"
                                       accept="image/*"
                                       data-field="image"
                                       th:attr="data-initial-label=${item.currentImagePath != null and !#strings.isEmpty(item.currentImagePath)} ? 'Файл выбран' : 'Выбрать файл...'">

                                <label class="custom-file-label"
                                       th:for="'basicInfographics' + ${stat.index} + '_image'"
                                       th:text="${item.currentImagePath != null and !#strings.isEmpty(item.currentImagePath)} ? 'Файл выбран' : 'Выбрать файл...'">
                                    Выбрать файл...
                                </label>
                            </div>

                            <div class="nb-file-field" th:if="${readOnly}">
                                <input type="text"
                                       class="form-control"
                                       th:value="${item.currentImagePath != null and !#strings.isEmpty(item.currentImagePath)} ? 'Изображение загружено' : 'Изображение отсутствует'"
                                       readonly>
                            </div>

                            <div class="nb-infographic-description">
                                <input type="text"
                                       class="form-control"
                                       th:field="*{basicInfographics[__${stat.index}__].description}"
                                       th:readonly="${readOnly}"
                                       data-field="description"
                                       placeholder="Описание">
                            </div>

                            <div class="nb-infographic-button" th:if="${!readOnly}">
                                <button th:if="${!readOnly}"
                                        type="button"
                                        class="btn nb-infographic-action-btn js-infographic-action">
                                    <i class="fas"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(basicForm.basicInfographics)}"
                     class="text-muted">
                    Инфографика пока не добавлена.
                </div>
            </div>

            <!-- Кнопки -->
            <div class="nb-form-actions" th:if="${!readOnly}">
                <a th:href="${cancelUrl}" class="btn btn-default">Отменить</a>
                <button type="submit" class="btn btn-success ml-2">Сохранить</button>
            </div>
        </div>
    </form>

    <!-- Шаблон новой строки инфографики -->
    <div th:if="${!readOnly}" id="infographic-item-template" class="d-none">
        <div class="nb-infographic-row js-infographic-item">
            <input type="hidden" data-field="currentImagePath" value="">
            <input type="hidden" data-field="sortOrder" value="">

            <div class="nb-infographic-line">
                <div class="custom-file nb-custom-file nb-file-field">
                    <input type="file"
                           class="custom-file-input"
                           accept="image/*"
                           data-field="image"
                           data-initial-label="Выбрать файл...">
                    <label class="custom-file-label">Выбрать файл...</label>
                </div>

                <div class="nb-infographic-description">
                    <input type="text"
                           class="form-control"
                           data-field="description"
                           placeholder="Описание">
                </div>

                <div class="nb-infographic-button">
                    <button type="button"
                            class="btn nb-infographic-action-btn js-infographic-action">
                        <i class="fas"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${!readOnly}">
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('basic-form');
            const container = document.getElementById('basic-infographics-container');
            const template = document.getElementById('infographic-item-template');

            const bannerInput = document.getElementById('bannerImageInput');
            const bannerWrapper = document.getElementById('bannerPreviewWrapper');

            function updateCustomFileLabel(input) {
                if (!input) {
                    return;
                }

                const customFile = input.closest('.custom-file');
                if (!customFile) {
                    return;
                }

                const label = customFile.querySelector('.custom-file-label');
                if (!label) {
                    return;
                }

                const initialLabel = input.dataset.initialLabel || 'Выбрать файл...';

                if (input.files && input.files.length > 0) {
                    label.textContent = input.files[0].name;
                } else {
                    label.textContent = initialLabel;
                }
            }

            function initBannerPreview() {
                if (!bannerInput || !bannerWrapper) {
                    return;
                }

                updateCustomFileLabel(bannerInput);

                bannerInput.addEventListener('change', function () {
                    updateCustomFileLabel(bannerInput);

                    const file = bannerInput.files && bannerInput.files[0];
                    if (!file) {
                        return;
                    }

                    const previewUrl = URL.createObjectURL(file);

                    const placeholderText = document.getElementById('bannerPlaceholderText');
                    if (placeholderText) {
                        placeholderText.remove();
                    }

                    let image = document.getElementById('bannerPreviewImage');
                    if (!image) {
                        image = document.createElement('img');
                        image.id = 'bannerPreviewImage';
                        image.className = 'banner-preview-image';
                        image.alt = 'Главный баннер';
                        bannerWrapper.appendChild(image);
                    }

                    image.src = previewUrl;
                    bannerWrapper.classList.remove('banner-placeholder');
                });
            }

            function renumberItems() {
                const items = container.querySelectorAll('.js-infographic-item');

                items.forEach(function (item, index) {
                    const currentImagePathInput = item.querySelector('[data-field="currentImagePath"]');
                    const sortOrderInput = item.querySelector('[data-field="sortOrder"]');
                    const descriptionInput = item.querySelector('[data-field="description"]');
                    const imageInput = item.querySelector('[data-field="image"]');
                    const imageLabel = imageInput
                        ? imageInput.closest('.custom-file').querySelector('.custom-file-label')
                        : null;

                    if (currentImagePathInput) {
                        currentImagePathInput.name = 'basicInfographics[' + index + '].currentImagePath';
                        currentImagePathInput.id = 'basicInfographics' + index + '.currentImagePath';
                    }

                    if (sortOrderInput) {
                        sortOrderInput.name = 'basicInfographics[' + index + '].sortOrder';
                        sortOrderInput.id = 'basicInfographics' + index + '.sortOrder';
                        sortOrderInput.value = index + 1;
                    }

                    if (descriptionInput) {
                        descriptionInput.name = 'basicInfographics[' + index + '].description';
                        descriptionInput.id = 'basicInfographics' + index + '.description';
                    }

                    if (imageInput) {
                        const imageId = 'basicInfographics' + index + '_image';
                        imageInput.name = 'basicInfographics[' + index + '].image';
                        imageInput.id = imageId;

                        if (imageLabel) {
                            imageLabel.setAttribute('for', imageId);
                        }

                        updateCustomFileLabel(imageInput);
                    }
                });
            }

            function syncActionButtons() {
                const items = container.querySelectorAll('.js-infographic-item');

                items.forEach(function (item, index) {
                    const button = item.querySelector('.js-infographic-action');
                    const icon = button ? button.querySelector('i') : null;

                    if (!button || !icon) {
                        return;
                    }

                    button.classList.remove('btn-danger', 'btn-outline-secondary', 'nb-action-add', 'nb-action-remove');
                    icon.classList.remove('fa-plus', 'fa-trash');

                    if (index === 0) {
                        button.dataset.action = 'add';
                        button.classList.add('btn-outline-secondary', 'nb-action-add');
                        icon.classList.add('fa-plus');
                    } else {
                        button.dataset.action = 'remove';
                        button.classList.add('btn-danger', 'nb-action-remove');
                        icon.classList.add('fa-trash');
                    }
                });
            }

            function addItem() {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = template.innerHTML.trim();

                const newItem = wrapper.firstElementChild;
                container.appendChild(newItem);

                renumberItems();
                syncActionButtons();
            }

            function ensureAtLeastOneItem() {
                const items = container.querySelectorAll('.js-infographic-item');
                if (items.length === 0) {
                    addItem();
                } else {
                    renumberItems();
                    syncActionButtons();
                }
            }

            if (container && form && template) {
                ensureAtLeastOneItem();

                container.addEventListener('click', function (event) {
                    const actionButton = event.target.closest('.js-infographic-action');
                    if (!actionButton) {
                        return;
                    }

                    const action = actionButton.dataset.action;

                    if (action === 'add') {
                        addItem();
                        return;
                    }

                    if (action === 'remove') {
                        const item = actionButton.closest('.js-infographic-item');
                        if (item) {
                            item.remove();
                            renumberItems();
                            syncActionButtons();
                        }
                    }
                });

                container.addEventListener('change', function (event) {
                    const fileInput = event.target.closest('[data-field="image"]');
                    if (!fileInput) {
                        return;
                    }

                    updateCustomFileLabel(fileInput);
                });

                form.addEventListener('submit', function () {
                    renumberItems();
                });
            }

            initBannerPreview();
        });
    </script>
</th:block>

</body>
</html>
