<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='newbuildings',
        headerTitle='Создание новостроя',
        breadcrumb='Новострои / Создание',
        extraStyles=~{::newbuildingStyles},
        extraScripts=~{}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создание новостроя</title>

    <th:block th:fragment="newbuildingStyles">
        <link rel="stylesheet" th:href="@{/css/admin/newbuildings.css}">
    </th:block>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Новый новострой</h3>
        </div>

        <div class="card-body">
            <div th:replace="~{admin/newbuildings/_tabs :: tabs(${mode}, ${activeTab}, null)}"></div>

            <div class="alert alert-info">
                На первом шаге создается только карточка новостроя.
                Баннер, инфографика и остальные данные будут доступны после сохранения.
            </div>

            <form method="post"
                  th:action="@{/admin/new-buildings}"
                  th:object="${createForm}">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-row">
                    <div class="col-md-5">
                        <div class="form-group">
                            <label>Название <span class="text-danger">*</span></label>
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                                   th:field="*{name}"
                                   placeholder="Название">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="form-group">
                            <label>Порядок сортировки <span class="text-danger">*</span></label>
                            <input type="number"
                                   min="1"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('sortOrder')} ? ' is-invalid'"
                                   th:field="*{sortOrder}"
                                   placeholder="Порядок сортировки">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('sortOrder')}"
                                 th:errors="*{sortOrder}"></div>
                        </div>
                    </div>

                    <div class="col-md-2">
                        <div class="form-group d-flex align-items-end" style="min-height: 74px;">
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox"
                                       class="custom-control-input"
                                       id="isActive"
                                       th:field="*{isActive}">
                                <label class="custom-control-label" for="isActive">Активен</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="nb-form-actions">
                    <a th:href="@{/admin/new-buildings}" class="btn btn-default">Отменить</a>
                    <button type="submit" class="btn btn-success ml-2">Создать и продолжить</button>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
