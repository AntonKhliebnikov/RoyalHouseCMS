<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">

<body>

<th:block th:fragment="tabs(mode, activeTab, newBuildingId)">
    <ul class="nav nav-tabs mb-3">

        <!-- Основное -->
        <li class="nav-item" th:if="${mode == 'create'}">
            <a th:href="@{/admin/new-buildings/new}"
               class="nav-link"
               th:classappend="${activeTab == 'basic'} ? ' active' : ''">
                Основное
            </a>
        </li>

        <li class="nav-item" th:if="${mode == 'edit'}">
            <a th:href="@{/admin/new-buildings/{id}/edit(id=${newBuildingId})}"
               class="nav-link"
               th:classappend="${activeTab == 'basic'} ? ' active' : ''">
                Основное
            </a>
        </li>

        <li class="nav-item" th:if="${mode == 'view'}">
            <a th:href="@{/admin/new-buildings/{id}(id=${newBuildingId})}"
               class="nav-link"
               th:classappend="${activeTab == 'basic'} ? ' active' : ''">
                Основное
            </a>
        </li>

        <!-- Остальные вкладки пока выключены -->
        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                О проекте
            </a>
        </li>

        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                Местоположение
            </a>
        </li>

        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                Инфраструктура
            </a>
        </li>

        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                Квартиры
            </a>
        </li>

        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                Панорама
            </a>
        </li>

        <li class="nav-item">
            <a href="#"
               class="nav-link disabled">
                Спецификация
            </a>
        </li>
    </ul>

    <div th:if="${mode == 'create'}" class="alert alert-info">
        Сначала сохраните новострой на вкладке «Основное». После этого станут доступны остальные вкладки.
    </div>
</th:block>

</body>
</html>
