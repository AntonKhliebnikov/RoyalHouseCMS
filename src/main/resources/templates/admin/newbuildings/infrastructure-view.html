<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='newbuildings',
        headerTitle='Просмотр новостроя',
        breadcrumb='Новострои / Просмотр новостроя / Инфраструктура',
        extraStyles=~{::newbuildingStyles},
        extraScripts=~{}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Просмотр вкладки Инфраструктура</title>

    <th:block th:fragment="newbuildingStyles">
        <link rel="stylesheet" th:href="@{/css/admin/newbuildings.css}">
    </th:block>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Просмотр: <span th:text="${newBuilding.name}"></span>
            </h3>
        </div>

        <div class="card-body">
            <div th:replace="~{admin/newbuildings/_tabs :: tabs(${mode}, ${activeTab}, ${newBuilding.id})}"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active">
                    <div th:replace="~{admin/newbuildings/_infrastructure-form :: infrastructureForm(
                        @{/admin/new-buildings},
                        true,
                        @{/admin/new-buildings}
                    )}"></div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <a th:href="@{/admin/new-buildings}" class="btn btn-default">
                    Назад
                </a>

                <a th:href="@{/admin/new-buildings/{id}/infrastructure(id=${newBuilding.id})}"
                   class="btn btn-warning ml-2">
                    Редактировать
                </a>
            </div>
        </div>
    </div>

</section>
</body>
</html>
