<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='newbuildings',
        headerTitle='Просмотр новостроя',
        breadcrumb='Новострои / Просмотр',
        extraStyles=~{::newBuildingStyles}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Просмотр новостроя</title>

    <th:block th:fragment="newbuildingStyles">
        <link rel="stylesheet" th:href="@{/css/admin/newbuildings.css}">
    </th:block>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Просмотр: <span th:text="${newBuilding.name}"></span>
            </h3>
        </div>

        <div class="card-body">
            <div th:replace="~{admin/newbuildings/_tabs :: tabs(${mode}, ${activeTab}, ${newBuilding.id})}"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active">
                    <div th:object="${newBuilding}">
                        <div class="form-group">
                            <label>Название</label>
                            <input type="text" class="form-control" th:value="*{name}" readonly>
                        </div>

                        <div class="form-group">
                            <label>Путь к баннеру</label>
                            <input type="text" class="form-control"
                                   th:value="*{bannerImagePath} ?: ''" readonly>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Порядок сортировки</label>
                                    <input type="text" class="form-control"
                                           th:value="*{sortOrder}" readonly>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Статус</label>
                                    <input type="text" class="form-control"
                                           th:value="*{isActive} ? 'Активный' : 'Неактивный'" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <hr>

            <div class="text-muted">
                Остальные вкладки будут реализованы следующим этапом.
            </div>
        </div>
    </div>

</section>
</body>
</html>
