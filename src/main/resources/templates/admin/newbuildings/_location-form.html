<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* @thymesVar id="locationForm" type="com.royalhouse.cms.admin.newbuilding.dto.AdminNewBuildingLocationForm" */-->
<!--/* @thymesVar id="_csrf" type="org.springframework.security.web.csrf.CsrfToken" */-->
<!--/* @thymesVar id="formAction" type="java.lang.String" */-->
<!--/* @thymesVar id="cancelUrl" type="java.lang.String" */-->
<!--/* @thymesVar id="readOnly" type="java.lang.Boolean" */-->

<th:block th:fragment="locationForm(formAction, readOnly, cancelUrl)">
    <form method="post"
          th:action="${formAction}"
          th:object="${locationForm}"
          id="location-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Город <span class="text-danger">*</span></label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('city')} ? ' is-invalid'"
                           th:field="*{city}"
                           th:readonly="${readOnly}"
                           placeholder="Город">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('city')}"
                         th:errors="*{city}"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label>Район <span class="text-danger">*</span></label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('district')} ? ' is-invalid'"
                           th:field="*{district}"
                           th:readonly="${readOnly}"
                           placeholder="Район">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('district')}"
                         th:errors="*{district}"></div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="col-md-8">
                <div class="form-group">
                    <label>Улица <span class="text-danger">*</span></label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('street')} ? ' is-invalid'"
                           th:field="*{street}"
                           th:readonly="${readOnly}"
                           placeholder="Улица">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('street')}"
                         th:errors="*{street}"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label>Дом <span class="text-danger">*</span></label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('houseNumber')} ? ' is-invalid'"
                           th:field="*{houseNumber}"
                           th:readonly="${readOnly}"
                           placeholder="Номер дома">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('houseNumber')}"
                         th:errors="*{houseNumber}"></div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Широта <span class="text-danger">*</span></label>
                    <input type="number"
                           step="0.000001"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('latitude')} ? ' is-invalid'"
                           th:field="*{latitude}"
                           th:readonly="${readOnly}"
                           placeholder="Например: 46.482526">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('latitude')}"
                         th:errors="*{latitude}"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-group">
                    <label>Долгота <span class="text-danger">*</span></label>
                    <input type="number"
                           step="0.000001"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('longitude')} ? ' is-invalid'"
                           th:field="*{longitude}"
                           th:readonly="${readOnly}"
                           placeholder="Например: 30.723309">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('longitude')}"
                         th:errors="*{longitude}"></div>
                </div>
            </div>
        </div>

        <div class="form-group nb-location-description-group">
            <label class="nb-block-title">Описание местоположения</label>
            <textarea class="form-control"
                      rows="8"
                      th:classappend="${#fields.hasErrors('locationDescription')} ? ' is-invalid'"
                      th:field="*{locationDescription}"
                      th:readonly="${readOnly}"
                      placeholder="Описание местоположения"></textarea>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('locationDescription')}"
                 th:errors="*{locationDescription}"></div>
        </div>

        <div class="nb-form-actions" th:if="${!readOnly}">
            <a th:href="${cancelUrl}" class="btn btn-default">Отменить</a>
            <button type="submit" class="btn btn-success ml-2">Сохранить</button>
        </div>
    </form>
</th:block>

</body>
</html>
