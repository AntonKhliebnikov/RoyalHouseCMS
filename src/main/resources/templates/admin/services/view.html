<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='services',
        headerTitle='Просмотр услуги',
        breadcrumb='Услуги / Просмотр услуги',
        extraStyles=~{::styles},
        extraScripts=~{}
      )}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Просмотр услуги</title>

    <th:block th:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/admin/services.css}">
    </th:block>
</head>

<body>
<section th:with="kyivZone=${T(java.time.ZoneId).of('Europe/Kyiv')}">

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                <span th:text="${serviceItem.name}">Название услуги</span>
            </h3>
        </div>

        <div class="card-body">

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Баннер</label>

                        <div class="service-image-box"
                             th:if="${serviceItem.bannerImagePath != null && !serviceItem.bannerImagePath.isBlank()}">
                            <img th:src="${serviceItem.bannerImagePath}" alt="Banner image">
                        </div>

                        <div class="service-image-box"
                             th:unless="${serviceItem.bannerImagePath != null && !serviceItem.bannerImagePath.isBlank()}">
                            <div class="service-image-placeholder">
                                <i class="fas fa-image fa-2x mb-2"></i>
                                <div>Изображение баннера не загружено</div>
                            </div>
                        </div>

                        <div class="service-help-text">Рекомендуемый размер: 1920x800</div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Превью</label>

                        <div class="service-image-box"
                             th:if="${serviceItem.previewImagePath != null && !serviceItem.previewImagePath.isBlank()}">
                            <img th:src="${serviceItem.previewImagePath}" alt="Preview image">
                        </div>

                        <div class="service-image-box"
                             th:unless="${serviceItem.previewImagePath != null && !serviceItem.previewImagePath.isBlank()}">
                            <div class="service-image-placeholder">
                                <i class="fas fa-image fa-2x mb-2"></i>
                                <div>Изображение превью не загружено</div>
                            </div>
                        </div>

                        <div class="service-help-text">Рекомендуемый размер: 500x350</div>
                    </div>
                </div>
            </div>

            <div class="form-row align-items-end">
                <div class="col-md-10">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text"
                               class="form-control form-control-sm service-readonly-control"
                               th:value="${serviceItem.name}"
                               readonly>
                    </div>
                </div>

                <div class="col-md-2">
                    <div class="form-group mb-3">
                        <div class="custom-control custom-checkbox service-checkbox-group">
                            <input type="checkbox"
                                   class="custom-control-input"
                                   id="isVisible"
                                   th:checked="${serviceItem.isVisible}"
                                   disabled>
                            <label class="custom-control-label" for="isVisible">Отображать</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea class="form-control form-control-sm service-readonly-control"
                          rows="8"
                          readonly
                          th:text="${serviceItem.description}"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Дата добавления</label>
                        <input type="text"
                               class="form-control form-control-sm service-readonly-control"
                               readonly
                               th:value="${serviceItem.createdAt == null ? '' :
                                    #temporals.format(
                                        T(java.time.ZonedDateTime).ofInstant(serviceItem.createdAt, kyivZone),
                                        'dd.MM.yyyy - HH:mm'
                                    )}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Дата обновления</label>
                        <input type="text"
                               class="form-control form-control-sm service-readonly-control"
                               readonly
                               th:value="${serviceItem.updatedAt == null ? '' :
                                    #temporals.format(
                                        T(java.time.ZonedDateTime).ofInstant(serviceItem.updatedAt, kyivZone),
                                        'dd.MM.yyyy - HH:mm'
                                    )}">
                    </div>
                </div>
            </div>

        </div>

        <div class="card-footer text-right">
            <a th:href="@{/admin/services}" class="btn btn-secondary">
                Назад
            </a>

            <a th:href="@{/admin/services/{id}/edit(id=${serviceItem.id})}" class="btn btn-warning">
                <i class="fas fa-pen"></i> Редактировать
            </a>
        </div>
    </div>

</section>
</body>
</html>
