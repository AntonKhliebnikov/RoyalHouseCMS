<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='properties',
        headerTitle='Редактирование объекта',
        breadcrumb='Объекты / Редактирование',
        extraStyles=~{},
        extraScripts=~{}
      )}">


<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование объекта</title>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Редактирование (ID: <span th:text="${propertyId}">0</span>)
            </h3>
        </div>

        <form th:action="@{|/admin/properties/${propertyId}|}" method="post" th:object="${form}">
            <div class="card-body">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-group">
                    <label>Тип недвижимости</label>
                    <select class="form-control form-control-sm"
                            th:field="*{propertyType}"
                            th:classappend="${#fields.hasErrors('propertyType')} ? ' is-invalid'">
                        <option value="">-- Выберите тип --</option>
                        <option th:each="type : ${propertyTypeOptions}"
                                th:value="${type}"
                                th:text="${type}">
                        </option>
                    </select>

                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('propertyType')}"
                         th:errors="*{propertyType}"></div>
                </div>

                <div class="form-group">
                    <label>Площадь</label>
                    <input type="number"
                           min="0.01"
                           step="0.01"
                           class="form-control form-control-sm"
                           th:field="*{area}"
                           th:classappend="${#fields.hasErrors('area')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('area')}"
                         th:errors="*{area}"></div>
                </div>

                <div class="form-group">
                    <label>Цена</label>
                    <input type="number"
                           min="0.01"
                           step="0.01"
                           class="form-control form-control-sm"
                           th:field="*{price}"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Кол-во комнат</label>
                    <input type="number"
                           min="0"
                           class="form-control form-control-sm"
                           th:field="*{rooms}"
                           th:classappend="${#fields.hasErrors('rooms')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('rooms')}"
                         th:errors="*{rooms}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Этаж</label>
                    <input type="number"
                           min="0"
                           class="form-control form-control-sm"
                           th:field="*{floor}"
                           th:classappend="${#fields.hasErrors('floor')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('floor')}"
                         th:errors="*{floor}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Кол-во этажей</label>
                    <input type="number"
                           min="0"
                           class="form-control form-control-sm"
                           th:field="*{totalFloors}"
                           th:classappend="${#fields.hasErrors('totalFloors')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('totalFloors')}"
                         th:errors="*{totalFloors}">
                    </div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </div>

            <div class="card-footer">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Сохранить
                </button>

                <a th:href="@{/admin/properties}" class="btn btn-secondary">
                    Отмена
                </a>
            </div>
        </form>
    </div>

</section>
</body>
</html>
