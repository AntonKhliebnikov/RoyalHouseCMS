<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='account',
        headerTitle='Смена пароля',
        breadcrumb='Аккаунт / Смена пароля'
      )}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ | Смена пароля</title>
</head>
<body>
<section>

    <div class="card card-warning">
        <div class="card-header">
            <h3 class="card-title">Смена пароля (для вашего аккаунта)</h3>
        </div>

        <form th:action="@{/admin/account/password}" method="post" th:object="${form}">
            <div class="card-body">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-group">
                    <label>Старый пароль</label>
                    <input type="password" class="form-control"
                           th:field="*{oldPassword}"
                           th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
                </div>

                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" class="form-control"
                           th:field="*{newPassword}"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                </div>

                <div class="form-group">
                    <label>Подтверждение нового пароля</label>
                    <input type="password" class="form-control"
                           th:field="*{confirmNewPassword}"
                           th:classappend="${#fields.hasErrors('confirmNewPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </div>

            <div class="card-footer">
                <button type="submit" class="btn btn-warning">
                    <i class="fas fa-key"></i> Сменить пароль
                </button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>

</section>
</body>
</html>
