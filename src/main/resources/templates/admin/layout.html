<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content, activeMenu, headerTitle, breadcrumb, extraStyles, extraScripts)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${pageTitle}">Admin | Royal House</title>

    <!-- AdminLTE v3.2.0 CSS -->
    <link rel="stylesheet" th:href="@{/adminlte/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/adminlte/dist/css/adminlte.min.css}">

    <th:block th:replace="${extraStyles} ?: ~{}"></th:block>
    <th:block th:replace="${extraScripts} ?: ~{}"></th:block>
</head>

<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- NAVBAR (верхняя шапка) -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- кнопка сворачивания меню -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>

            <li class="nav-item d-none d-sm-inline-block">
                <span class="navbar-text font-weight-bold">Панель администратора</span>
            </li>
        </ul>

        <!-- правая часть шапки -->
        <ul class="navbar-nav ml-auto">
            <!-- Фото + ФИО -->
            <li class="nav-item d-flex align-items-center mr-3">
                <img th:src="@{/adminlte/dist/img/user2-160x160.jpg}"
                     alt="avatar"
                     style="width:28px;height:28px;border-radius:50%;object-fit:cover;"
                     class="mr-2">

                <span class="navbar-text" sec:authentication="principal.fullName"></span>
            </li>

            <!-- Logout -->
            <li class="nav-item">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <!-- SIDEBAR (левое меню) -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/admin}" class="brand-link">
            <span class="brand-text font-weight-light">Royal House CMS</span>
        </a>

        <!--        <a th:href="@{/admin}" class="brand-link d-flex align-items-center">-->
        <!--            <img th:src="@{/adminlte/dist/img/logo.png}"-->
        <!--                 alt="Royal House"-->
        <!--                 style="height: 34px; width: auto;">-->
        <!--        </a>-->

        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column"
                    data-widget="treeview" role="menu" data-accordion="false">

                    <li class="nav-item">
                        <a th:href="@{/admin}"
                           class="nav-link"
                           th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Панель управления</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/admin/users}"
                           class="nav-link"
                           th:classappend="${activeMenu == 'users'} ? 'active'">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Пользователи</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/admin/applications}"
                           class="nav-link"
                           th:classappend="${activeMenu == 'applications'} ? 'active'">
                            <i class="nav-icon fas fa-inbox"></i>
                            <p>Заявки</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/admin/properties}"
                           class="nav-link"
                           th:classappend="${activeMenu == 'properties'} ? 'active'">
                            <i class="nav-icon fas fa-building"></i>
                            <p>Объекты</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/admin/new-buildings}"
                           class="nav-link"
                           th:classappend="${activeMenu == 'newbuildings'} ? 'active'">
                            <i class="nav-icon fas fa-city"></i>
                            <p>Новострои</p>
                        </a>
                    </li>

                    <!-- Тут позже добавишь остальные пункты мокапа:
                         Заявки, Объекты, Новострои, Услуги, Настройки... -->
                </ul>
            </nav>
        </div>
    </aside>

    <!-- CONTENT WRAPPER (контентная часть справа) -->
    <div class="content-wrapper">

        <!-- Заголовок страницы + breadcrumb -->
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 th:text="${headerTitle}">Заголовок</h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin}">Главная</a>
                            </li>
                            <li class="breadcrumb-item active" th:text="${breadcrumb}">Раздел</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>

        <hr class="m-0">

        <!-- Основной контент -->
        <section class="content pt-3">
            <div class="container-fluid px-4">

                <!-- Flash-сообщения (redirectAttributes.addFlashAttribute) -->
                <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                <!-- сюда подставится содержимое конкретной страницы -->
                <div th:replace="${content}"></div>

            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Royal House CMS</strong>
        <div class="float-right d-none d-sm-inline-block">
            <b>v</b> 0.1
        </div>
    </footer>

</div>

<!-- AdminLTE v3.2.0 JS -->
<script th:src="@{/adminlte/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/adminlte/dist/js/adminlte.min.js}"></script>
</body>
</html>
