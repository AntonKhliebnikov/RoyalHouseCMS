<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='users',
        headerTitle='Редактирование пользователя',
        breadcrumb='Пользователи / Редактирование'
      )}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование пользователя</title>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">
                Редактирование (ID: <span th:text="${userId}">0</span>)
            </h3>
        </div>

        <form th:action="@{|/admin/users/${userId}|}" method="post" th:object="${form}">
            <div class="card-body">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-group">
                    <label>Имя</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </div>

            <div class="card-footer">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Сохранить
                </button>

                <a th:href="@{/admin/users}" class="btn btn-secondary">
                    Отмена
                </a>

                <!-- Если редактируем СЕБЯ -> Change password -->
                <a class="btn btn-warning"
                   th:if="${form.email == #authentication.name}"
                   th:href="@{/admin/account/password}">
                    <i class="fas fa-key"></i> Сменить пароль
                </a>

                <!-- Если редактируем ДРУГОГО -> Reset password -->
                <a class="btn btn-danger"
                   th:if="${form.email != #authentication.name}"
                   th:href="@{|/admin/users/${userId}/password/reset|}">
                    <i class="fas fa-redo"></i> Сбросить пароль
                </a>
            </div>
        </form>
    </div>

</section>
</body>
</html>
