<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='users',
        headerTitle='Сброс пароля',
        breadcrumb='Пользователи / Сброс пароля',
        extraStyles=~{},
        extraScripts=~{}
      )}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ | Сброс пароля</title>
</head>
<body>
<section>

    <div class="card card-danger">
        <div class="card-header">
            <h3 class="card-title">Сброс пароля (для другого пользователя)</h3>
        </div>

        <form th:action="@{|/admin/users/${userId}/password/reset|}" method="post" th:object="${form}">
            <div class="card-body">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" class="form-control"
                           th:field="*{newPassword}"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}"
                         th:errors="*{newPassword}"></div>
                </div>

                <div class="form-group">
                    <label>Подтверждение нового пароля</label>
                    <input type="password" class="form-control"
                           th:field="*{confirmNewPassword}"
                           th:classappend="${#fields.hasErrors('confirmNewPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmNewPassword')}"
                         th:errors="*{confirmNewPassword}"></div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </div>

            <div class="card-footer">
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-redo"></i> Сбросить пароль
                </button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>

</section>
</body>
</html>
