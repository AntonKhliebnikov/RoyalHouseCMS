<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='users',
        headerTitle='Пользователи',
        breadcrumb='Пользователи'
      )}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ | Пользователи</title>
</head>

<body>
<section>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Список администраторов</h3>

            <div class="card-tools">
                <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">
                    <i class="fas fa-plus"></i> Создать админа
                </a>
            </div>
        </div>

        <div class="card-body table-responsive p-0">
            <table class="table table-hover text-nowrap">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th style="width: 320px;">Действия</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.name}">Name</td>
                    <td th:text="${u.email}">Email</td>
                    <td>
                        <span class="badge badge-success" th:text="${u.role}">ADMIN</span>
                    </td>

                    <td>
                        <!-- Edit всегда можно -->
                        <a class="btn btn-info btn-sm"
                           th:href="@{|/admin/users/${u.id}/edit|}">
                            <i class="fas fa-pen"></i> Редактировать
                        </a>

                        <!-- ЕСЛИ это текущий пользователь -> Change (мой пароль) -->
                        <a class="btn btn-warning btn-sm"
                           th:if="${u.email == #authentication.name}"
                           th:href="@{/admin/account/password}">
                            <i class="fas fa-key"></i> Сменить пароль
                        </a>

                        <!-- ИНАЧЕ -> Reset (сброс пароля другому пользователю) -->
                        <a class="btn btn-danger btn-sm"
                           th:if="${u.email != #authentication.name}"
                           th:href="@{|/admin/users/${u.id}/password/reset|}">
                            <i class="fas fa-redo"></i> Сбросить пароль
                        </a>

                        <!-- Delete: запрещаем удалять самого себя (кнопку скрываем) -->
                        <form th:if="${u.email != #authentication.name}"
                              th:action="@{|/admin/users/${u.id}/delete|}"
                              method="post"
                              style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-secondary btn-sm" type="submit"
                                    onclick="return confirm('Удалить пользователя?');">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="text-center text-muted p-3">
                        Пользователей пока нет
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
</body>
</html>
