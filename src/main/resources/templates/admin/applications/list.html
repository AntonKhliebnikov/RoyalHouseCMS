<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='applications',
        headerTitle='Заявки',
        breadcrumb='Заявки'
      )}">


<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ | Заявки</title>
</head>

<body>
<section th:with="kyivZone=${T(java.time.ZoneId).of('Europe/Kyiv')}">

    <div class="card">
        <div class="card-body">
            <!-- Фильтры: GET, отдельно -->
            <form method="get" th:action="@{/admin/applications}" class="mb-3">
                <div class="row g-2 align-items-end">
                    <div class="col">
                        <label class="form-label mb-1">Имя</label>
                        <input class="form-control form-control-sm" name="fullName" th:value="${filter.fullName}">
                    </div>

                    <div class="col">
                        <label class="form-label mb-1">Телефон</label>
                        <input class="form-control form-control-sm" name="phone" th:value="${filter.phone}">
                    </div>

                    <div class="col">
                        <label class="form-label mb-1">Email</label>
                        <input class="form-control form-control-sm" name="email" th:value="${filter.email}">
                    </div>

                    <div class="col">
                        <label class="form-label mb-1">Комментарий</label>
                        <input class="form-control form-control-sm" name="comment" th:value="${filter.comment}">
                    </div>

                    <div class="col-auto">
                        <label class="form-label mb-1">Статус</label>
                        <select class="form-control form-control-sm" name="status">
                            <option value="" th:selected="${filter.status == null}">Все</option>
                            <option th:each="s : ${statusOptions}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${filter.status == s}">
                            </option>
                        </select>
                    </div>

                    <div class="col-auto">
                        <button class="btn btn-primary btn-sm" type="submit">Фильтр</button>
                    </div>

                    <div class="col-auto">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/applications}">Очистить</a>
                    </div>

                    <div class="col-auto">
                        <a class="btn btn-success btn-sm"
                           th:href="@{/admin/applications/export(
                              fullName=${filter.fullName},
                              phone=${filter.phone},
                              email=${filter.email},
                              comment=${filter.comment},
                              status=${filter.status}
                           )}">
                            Скачать в Excel
                        </a>
                    </div>
                </div>
            </form>

            <!-- Таблица: без внешней формы -->
            <div class="table-responsive">
                <table class="table table-bordered table-striped mb-0">
                    <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Комментарий</th>
                        <th>Дата</th>
                        <th>Статус</th>
                        <th style="width: 110px;"></th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="app : ${page.content}">
                        <td th:text="${app.fullName}"></td>
                        <td th:text="${app.phone}"></td>
                        <td th:text="${app.email}"></td>

                        <td th:text="${app.comment == null ? '' : #strings.abbreviate(app.comment, 40)}"></td>

                        <td th:text="${app.createdAt == null ? '' :
                    #temporals.format(
                    T(java.time.ZonedDateTime).ofInstant(app.createdAt, kyivZone),
                    'dd.MM.yyyy - HH:mm'
                    )}">
                        </td>

                        <td>
                            <!-- toggle-status: POST -->
                            <form th:action="@{/admin/applications/{id}/toggle-status(id=${app.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <!-- сохраняем фильтры и пагинацию -->
                                <input type="hidden" name="fullName" th:value="${filter.fullName}"/>
                                <input type="hidden" name="phone" th:value="${filter.phone}"/>
                                <input type="hidden" name="email" th:value="${filter.email}"/>
                                <input type="hidden" name="comment" th:value="${filter.comment}"/>
                                <input type="hidden" name="status" th:value="${filter.status}"/>

                                <input type="hidden" name="page" th:value="${page.number}"/>
                                <input type="hidden" name="size" th:value="${page.size}"/>

                                <button type="submit"
                                        class="btn btn-sm"
                                        style="min-width: 80px;"
                                        th:classappend="${app.status.name() == 'NEW'} ? 'btn-warning' : 'btn-success'"
                                        th:text="${app.status.name() == 'NEW'} ? 'Новая' : 'Отвечено'">
                                </button>
                            </form>
                        </td>

                        <td class="text-center">
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/admin/applications/{id}(id=${app.id})}">
                                <i class="fas fa-eye"></i>
                            </a>

                            <!-- delete: POST -->
                            <form th:action="@{/admin/applications/{id}/delete(id=${app.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <!-- сохраняем фильтры и пагинацию -->
                                <input type="hidden" name="fullName" th:value="${filter.fullName}"/>
                                <input type="hidden" name="phone" th:value="${filter.phone}"/>
                                <input type="hidden" name="email" th:value="${filter.email}"/>
                                <input type="hidden" name="comment" th:value="${filter.comment}"/>
                                <input type="hidden" name="status" th:value="${filter.status}"/>

                                <input type="hidden" name="page" th:value="${page.number}"/>
                                <input type="hidden" name="size" th:value="${page.size}"/>

                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Удалить заявку?');">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${page.totalElements == 0}">
                        <td colspan="7" class="text-center text-muted py-4">
                            Ничего не найдено
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${page.totalPages > 1}" aria-label="Pagination" class="mt-3">
                <ul class="pagination pagination-sm mb-0">

                    <!-- Назад -->
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/applications(
                                         page=${page.number - 1},
                                         size=${page.size},
                                         fullName=${filter.fullName},
                                         phone=${filter.phone},
                                         email=${filter.email},
                                         comment=${filter.comment},
                                         status=${filter.status}
                                         )}">&laquo;
                        </a>
                    </li>

                    <!-- Номера страниц -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                        th:classappend="${i == page.number} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/applications(
                                         page=${i},
                                         size=${page.size},
                                         fullName=${filter.fullName},
                                         phone=${filter.phone},
                                         email=${filter.email},
                                         comment=${filter.comment},
                                         status=${filter.status}
                                         )}"
                        ></a>
                    </li>

                    <!-- Вперёд -->
                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/applications(
                                        page=${page.number + 1},
                                        size=${page.size},
                                        fullName=${filter.fullName},
                                        phone=${filter.phone},
                                        email=${filter.email},
                                        comment=${filter.comment},
                                        status=${filter.status}
                                        )}">&raquo;
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</section>
</body>
</html>
