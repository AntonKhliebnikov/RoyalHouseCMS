<!doctype html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(
        pageTitle=~{::title},
        content=~{::section},
        activeMenu='dashboard',
        headerTitle='Панель управления',
        breadcrumb='Панель управления',
        extraStyles=~{},
        extraScripts=~{}
      )}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ | Панель управления</title>
</head>

<body>
<section>

    <div class="row">
        <div class="col-lg-4 col-12">
            <div class="small-box bg-info">
                <div class="inner">
                    <h3>Users</h3>
                    <p>Управление администраторами</p>
                </div>
                <div class="icon">
                    <i class="fas fa-users"></i>
                </div>
                <a th:href="@{/admin/users}" class="small-box-footer">
                    Открыть <i class="fas fa-arrow-circle-right"></i>
                </a>
            </div>
        </div>

        <!-- Позже добавишь коробки под мокап: Заявки, Объекты, Новострои -->
        <div class="col-lg-4 col-12">
            <div class="small-box bg-success">
                <div class="inner">
                    <h3>Applications</h3>
                    <p>Заявки</p>
                </div>
                <div class="icon">
                    <i class="fas fa-inbox"></i>
                </div>
                <a th:href="@{/admin/applications}" class="small-box-footer">
                    Открыть <i class="fas fa-arrow-circle-right"></i>
                </a>
            </div>
        </div>

        <div class="col-lg-4 col-12">
            <div class="small-box bg-warning">
                <div class="inner">
                    <h3>Properties</h3>
                    <p>Объекты недвижимости</p>
                </div>
                <div class="icon">
                    <i class="fas fa-building"></i>
                </div>
                <a th:href="@{/admin/properties}" class="small-box-footer">
                    Открыть <i class="fas fa-arrow-circle-right"></i>
                </a>
            </div>
        </div>

        <div class="col-lg-4 col-12">
            <div class="small-box bg-lime">
                <div class="inner">
                    <h3>New buildings</h3>
                    <p>Новострои</p>
                </div>
                <div class="icon">
                    <i class="fas fa-city"></i>
                </div>
                <a th:href="@{/admin/new-buildings}" class="small-box-footer">
                    Открыть <i class="fas fa-arrow-circle-right"></i>
                </a>
            </div>
        </div>

        <div class="col-lg-4 col-12">
            <div class="small-box bg-info">
                <div class="inner">
                    <h3>Services</h3>
                    <p>Услуги</p>
                </div>
                <div class="icon">
                    <i class="fas fa-cogs"></i>
                </div>
                <a th:href="@{/admin/services}" class="small-box-footer">
                    Открыть <i class="fas fa-arrow-circle-right"></i>
                </a>
            </div>
        </div>
    </div>

</section>
</body>
</html>
